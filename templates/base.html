<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block titulo %} {% endblock %} UNES</title>
</head>

<body>
    <header>
        <!-- <img class="logo" src="imagens/logo_UNES.png" alt="Logo universidade UNES"> -->
        <img class="logo" src="{{url_for('static', filename='imagens/logo_UNES.png')}}" alt="Logo universidade UNES">

        <nav class="navbar navbar-expand-lg navbar-light" style="background-color: rgb(223, 221, 206); position: relative; z-index: 1000;">
  <div class="container-fluid">

    <!-- só aparece no mobile -->
    <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse d-none d-lg-flex justify-content-end">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/quem_somos">Quem Somos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/contato">Contato</a>
        </li>
      </ul>
    </div>

    <!-- Offcanvas (mobile) -->
    <div class="offcanvas offcanvas-end d-lg-none" tabindex="-1" id="menuLateral">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
      </div>

      <div class="offcanvas-body">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quem_somos">Quem Somos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/contato">Contato</a>
          </li>
        </ul>
      </div>
    </div>

  </div>
</nav>

    </header>

    {% block conteudo %}

    {% endblock %}

    <footer>
        <h3>@Todos os direitos reservados</h3>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
